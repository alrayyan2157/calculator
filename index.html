<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Calculator</h1>
    <div class="conatiner">
        <div class="display"></div>
        <div class="numpad">
            <div class="numbers"></div>
            <div class="operators">
                <button value="Clear"></button>
                <button value="+"></button>
                <button value="-"></button>
                <button value="*"></button>
                <button value="/"></button>
            </div>
        </div>
    </div>
</body>
</html>
